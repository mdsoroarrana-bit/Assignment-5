<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub lssues Tracker Home</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <section class="w-full h-[60px] bg-gray-100">
      <nav class="flex justify-between items-center mx-10">
        <div class=" flex mt-3 gap-3">
            <img class=" w-8" src="./assets/github-logo.png" alt="">
            <h3 class="text-2xl font-bold">GitHub lssues Tracker</h3>
        </div>
        

        <div class="pt-2 flex gap-4">
            <label class="input">
                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <g
                    stroke-linejoin="round"
                    stroke-linecap="round"
                    stroke-width="2.5"
                    fill="none"
                    stroke="currentColor"
                    >
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.3-4.3"></path>
                    </g>
                </svg>
                <input type="search" required placeholder="Search" />
                </label>
            <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
        </div>
       </nav>
    </section>

    <section class="w-11/12 bg-gray-100 mt-10 h-[100px] mx-auto rounded-2xl">
        <div class="pt-6 pl-7 space-x-3">
            <button id="all" class="btn btn-primary">ALL</button>
            <button id="open" class="btn btn-primary">Open</button>
            <button id="closed" class="btn btn-primary">Closed</button>
        </div>
    </section>

    
    
    
     
    <main class="">
        <div class="bg-gray-200 w-11/12 h-[100px] mx-auto my-4 rounded-2xl flex justify-between items-center ">
            <div class="flex ">
             <p class="w-5  m-4 font-light"><i class="fa-solid fa-atom"></i></p> 
            <div>
                <h2 class="font-bold text-2xl">50 Lssues</h2>
                <p class="text-[#64748B]">Track and manage your project issues</p>
            </div>
            </div>
            
            <div class="flex gap-6 m-4">
                <p><span class="bg-green-500 rounded-full"><i class="fa-regular fa-circle"></i></span> Open</p>
                <p><span class="bg-fuchsia-600 rounded-full"><i class="fa-regular fa-circle"></i></span> Closed</p>
            </div>
        </div>
    </main>
    

    <section id="level-container" class="w-11/12 mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 justify-between m-6 gap-6"></section>

        




   <!-- Open the modal using ID.showModal() method -->
        <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
             <div id="details-conteiner" class="">
                
            </div>
            <div class="modal-action">
            <form method="dialog">
                <!-- if there is a button in form, it will close the modal -->
                <button class="btn">Close</button>
            </form>
            </div>
        </div>
        </dialog>

        
    <script src="./home.js"></script>
</body>
</html>
